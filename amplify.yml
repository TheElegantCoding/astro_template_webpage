version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22.17.0
        - nvm use 22.17.0
        - curl -fsSL https://bun.sh/install | bash
        - export PATH="$HOME/.bun/bin:$PATH"
        - bun install --frozen-lockfile
    build:
      commands:
        - bun run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
cache:
  paths:
    - ~/.bun/install/cache/**/*
    - node_modules/**/*